name: Feature Request
description: Suggest a new feature or improvement for @cyanheads/secedgar-mcp-server
labels: ["enhancement"]
body:
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What problem does this solve? Who benefits?
    validations:
      required: true

  - type: textarea
    id: proposed-behavior
    attributes:
      label: Proposed behavior
      description: Describe the expected behavior or API change. Include example code if possible.
      render: typescript
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What you tried or considered instead, and why it fell short.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Related issues, prior art, links, or anything else relevant.
    validations:
      required: false
